<!DOCTYPE html>
<html>
<head>
  <title>Chat RP</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    #chat {
      max-width: 400px;
      margin: auto;
      background: #222;
      padding: 10px;
      border-radius: 10px;
    }

    ul {
      list-style: none;
      padding: 0;
      max-height: 300px;
      overflow-y: auto;
    }

    li {
      background: #333;
      margin: 5px;
      padding: 8px;
      border-radius: 5px;
      text-align: left;
    }

    input {
      margin: 5px;
      padding: 8px;
      width: 80%;
    }

    button {
      padding: 8px;
      background: #00ff99;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h2>🔥 Chat RP</h2>

<div id="chat">

  <input id="pseudo" placeholder="Ton pseudo..." />
  <br>

  <ul id="messages"></ul>

  <input id="msg" placeholder="Ton message RP..." />
  <br>
  <button onclick="send()">Envoyer</button>

</div>

<script>
let messages = JSON.parse(localStorage.getItem("chat")) || [];

function afficher() {
  const list = document.getElementById("messages");
  list.innerHTML = "";

  messages.forEach(m => {
    const li = document.createElement("li");
    li.innerHTML = "<b>" + m.pseudo + ":</b> " + m.text;
    list.appendChild(li);
  });
}

function send() {
  const pseudo = document.getElementById("pseudo").value;
  const msg = document.getElementById("msg").value;

  if (!pseudo || !msg) {
    alert("Remplis le pseudo et le message !");
    return;
  }

  messages.push({
    pseudo: pseudo,
    text: msg
  });

  localStorage.setItem("chat", JSON.stringify(messages));

  document.getElementById("msg").value = "";

  afficher();
}

afficher();
</script>

</body>
  </html>
