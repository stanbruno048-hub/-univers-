<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat App</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111b21;
}

/* Header */
.header {
  background: #202c33;
  color: white;
  padding: 15px;
  font-size: 18px;
}

/* Chat box */
.chat {
  height: 80vh;
  overflow-y: auto;
  padding: 10px;
  background: #0b141a;
}

/* Messages */
.message {
  max-width: 70%;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  color: white;
}

.sent {
  background: #005c4b;
  margin-left: auto;
}

.received {
  background: #202c33;
}

/* Input area */
.input-area {
  display: flex;
  padding: 10px;
  background: #202c33;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

button {
  margin-left: 10px;
  padding: 10px;
  border: none;
  border-radius: 50%;
  background: #00a884;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="header">💬 Mon Chat</div>

<div id="chat" class="chat"></div>

<div class="input-area">
  <input type="text" id="msg" placeholder="Message...">
  <button onclick="sendMessage()">➤</button>
</div>

<script>
function sendMessage() {
  let input = document.getElementById("msg");
  let text = input.value;

  if(text.trim() === "") return;

  addMessage(text, "sent");

  input.value = "";

  // Simulation réponse automatique
  setTimeout(() => {
    addMessage("Réponse automatique 🤖", "received");
  }, 1000);
}

function addMessage(text, type) {
  let chat = document.getElementById("chat");

  let div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
